# Netlify configuration for Sai Flowers website

[build]
  # No build command needed - this is a static HTML/CSS/JS site
  command = ""
  # Publish directory is the root since index.html is at the root
  publish = "."

# SPA redirect: All routes serve index.html for clean URLs
[[redirects]]
  from = "/wedding"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/welcome"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/puja"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/car"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/birthday"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/allevent"
  to = "/index.html"
  status = 200

# Redirect old .html URLs to clean URLs
[[redirects]]
  from = "/events/wedding.html"
  to = "/wedding"
  status = 301

[[redirects]]
  from = "/events/welcome.html"
  to = "/welcome"
  status = 301

[[redirects]]
  from = "/events/puja.html"
  to = "/puja"
  status = 301

[[redirects]]
  from = "/events/car.html"
  to = "/car"
  status = 301

[[redirects]]
  from = "/events/birthday.html"
  to = "/birthday"
  status = 301

[[redirects]]
  from = "/events/allevent.html"
  to = "/allevent"
  status = 301

# Redirect root to index.html
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Custom 404 page - all unmatched routes go here
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Cache headers for static assets
[[headers]]
  for = "*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "*.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Block all search engine bots from indexing the site
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Ensure 404.html itself is not indexed
[[headers]]
  for = "/404.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"