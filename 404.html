<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e91e63">
    <title>Page Not Found - Sai Flower</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #fce4ec, #fff);
            padding: 20px;
        }
        .error-page h1 { font-size: 6rem; color: var(--primary); margin-bottom: 10px; }
        .error-page h2 { font-size: 2rem; color: var(--dark); margin-bottom: 15px; }
        .error-page p { color: var(--text); margin-bottom: 30px; font-size: 1.1rem; }
        .error-page .btn { display: inline-block; }
        @media (max-width: 767px) {
            .error-page h1 { font-size: 4rem; }
            .error-page h2 { font-size: 1.5rem; }
        }
    </style>
    <!-- SPA redirect script for GitHub Pages -->
    <script>
        // GitHub Pages SPA redirect: redirect all 404s to index.html
        sessionStorage.redirect = location.href;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'">
</head>
<body>
    <div class="error-page">
        <div>
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <a href="/" class="btn">Back to Home</a>
        </div>
    </div>
</body>
</html>
