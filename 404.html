<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Page not found">
    <title>404 - Page Not Found | Sai Flower</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--light);
            padding: 20px;
        }
        .error-content {
            max-width: 500px;
        }
        .error-content h1 {
            font-size: 8rem;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--dark);
        }
        .error-content p {
            color: var(--text);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .error-content .btn {
            display: inline-block;
        }
        .error-content .btn i {
            margin-right: 8px;
        }
        @media (max-width: 480px) {
            .error-content h1 { font-size: 5rem; }
            .error-content h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <h1>404</h1>
            <h2>Page Not Found</h2>
            <p>The page you are looking for does not exist or has been moved. Please check the URL or return to the homepage.</p>
            <a href="index.html" class="btn"><i class="fas fa-home" aria-hidden="true"></i> Return Home</a>
        </div>
    </div>
</body>
</html>
